<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  background: black;
  color: white;
  font-family: monospace;
  padding: 20px;
  margin: 0;
}

.cursor {
  display: inline-block;
  width: 10px;
  height: 1em; /* высота как текст */
  background: white;
  margin-left: 2px;
  vertical-align: bottom;
  animation: blink 1s step-start infinite;
}

@keyframes blink {
  50% { background: transparent; }
}
</style>
</head>
<body>

<p><span id="text"></span><span class="cursor"></span></p>

<script>
let msg = "Добро пожаловать на мой сайт...";
let i = 0;

function type() {
  if (i < msg.length) {
    document.getElementById("text").innerHTML += msg[i];
    i++;
    setTimeout(type, 50);
  }
}

type();
</script>

</body>
</html>
