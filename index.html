<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  background: black;
  color: white;
  font-family: monospace;
  padding: 20px;
  margin: 0;
}

/* Курсор */
.cursor {
  display: inline-block;
  width: 12px;       /* шире, чтобы было видно */
  height: 1.2em;     /* чуть выше текста */
  background: white; 
  margin-left: 3px;
  vertical-align: bottom;
  animation: blink 0.7s step-start infinite; /* быстрее мигание */
}

@keyframes blink {
  50% { background: transparent; }
}
</style>
</head>
<body>

<p><span id="text"></span><span class="cursor"></span></p>

<script>
let msg = "Добро пожаловать на мой сайт...";
let i = 0;

function type() {
  if (i < msg.length) {
    document.getElementById("text").innerHTML += msg[i];
    i++;
    setTimeout(type, 50);
  }
}

type();
</script>

</body>
</html>
